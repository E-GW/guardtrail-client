<!-- index.html -->
<!-- The single HTML file that React mounts into. During the build process,
     React injects the compiled JavaScript bundle into the <body> tag.
     The app renders inside the <div id="root"> element. -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- App icon shown in the browser tab -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Ensures the app scales correctly on mobile devices and doesn't
         allow the browser to zoom in on input fields -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Sets the browser chrome color on mobile (Android) -->
    <meta name="theme-color" content="#000000" />

    <!-- Description shown in search engine results and link previews -->
    <meta
      name="description"
      content="GuardTrail — crowdsourced trail condition reporting for hikers and land managers."
    />

    <!-- Icon shown when the app is saved to an iOS home screen -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Web app manifest — defines app name, icons, and display settings
         used when installed as a Progressive Web App (PWA) on mobile -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- %PUBLIC_URL% is replaced with the correct base URL at build time,
         ensuring paths work correctly whether hosted at the root or a subdirectory -->

    <title>GuardTrail</title>
  </head>
  <body>

    <!-- Fallback message for browsers with JavaScript disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React mounts the entire application here at runtime.
         Everything you see in the app is injected into this single div. -->
    <div id="root"></div>

    <!-- The compiled JavaScript bundle is automatically injected here
         by the React build process — do not add script tags manually. -->
  </body>
</html>
